name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example v1.2.3"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          case "$version" in
            v*) ;;
            *) version="v${version}" ;;
          esac
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM Java 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Check release version metadata
        run: |
          set -eu
          expected="${{ steps.version.outputs.version }}"
          actual="v$(sed -n 's/.*VERSION = \"\\([^\"]*\\)\".*/\\1/p' sysboot/cli/src/dev/sysboot/cli/command/VersionProvider.java)"
          if [ "$actual" != "$expected" ]; then
            echo "Version metadata mismatch: expected ${expected}, found ${actual}" >&2
            exit 1
          fi

      - name: Check native-image metadata
        run: python3 scripts/check-native-metadata.py

      - name: Run tests
        working-directory: sysboot
        run: ./mill __.test

      - name: Validate example configs
        working-directory: sysboot
        run: for f in config/*.yaml; do ./mill cli.run validate --no-tui -c "$f"; done

      - name: Build JVM assembly
        working-directory: sysboot
        run: ./mill cli.assembly

      - name: Build native image
        working-directory: sysboot
        run: ./mill cli.nativeImage

      - name: Smoke test native image
        run: |
          sysboot/out/cli/nativeImage.dest/native-executable --help >/dev/null
          expected="${{ steps.version.outputs.version }}"
          expected="${expected#v}"
          test "$(sysboot/out/cli/nativeImage.dest/native-executable --version)" = "fluxion ${expected}"
          for f in sysboot/config/*.yaml; do
            sysboot/out/cli/nativeImage.dest/native-executable validate --no-tui -c "$f"
          done

      - name: Package release assets
        run: |
          set -eu
          version="${{ steps.version.outputs.version }}"
          mkdir -p dist/pkg
          cp sysboot/out/cli/assembly.dest/out.jar "dist/fluxion-${version}-all.jar"
          cp sysboot/out/cli/nativeImage.dest/native-executable dist/pkg/fluxion
          chmod +x dist/pkg/fluxion
          cp README.md dist/pkg/README.md
          mkdir -p dist/pkg/docs dist/pkg/config
          cp -R sysboot/docs/. dist/pkg/docs/
          cp -R sysboot/config/. dist/pkg/config/
          [ ! -f LICENSE ] || cp LICENSE dist/pkg/LICENSE
          tar -C dist/pkg -czf "dist/fluxion-${version}-linux-amd64.tar.gz" .
          (cd dist && sha256sum "fluxion-${version}-all.jar" "fluxion-${version}-linux-amd64.tar.gz" > "fluxion-${version}-checksums.sha256")

      - name: Upload release assets as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fluxion-release-${{ steps.version.outputs.version }}
          path: |
            dist/*.jar
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: fluxion-release-${{ needs.build.outputs.version }}
          path: dist

      - name: Ensure release tag exists
        run: |
          set -eu
          tag="${{ needs.build.outputs.version }}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists"
          else
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "refs/tags/${tag}"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: fluxion ${{ needs.build.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            dist/*.jar
            dist/*.tar.gz
            dist/*.sha256
