name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
            sysboot/out
          key: ${{ runner.os }}-mill-${{ hashFiles('sysboot/.mill-version', 'sysboot/build.mill.yaml', 'sysboot/**/package.mill.yaml') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Run tests
        working-directory: sysboot
        run: ./mill __.test

      - name: Validate example configs
        working-directory: sysboot
        run: |
          ./mill cli.run validate -c config/example-fedora.yaml
          ./mill cli.run validate -c config/example-arch.yaml
          ./mill cli.run validate -c config/example-opensuse.yaml
          ./mill cli.run validate -c config/system-bootstrap-fedora.yaml

  build-jvm:
    name: Build JVM App
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build assembly JAR
        working-directory: sysboot
        run: ./mill cli.assembly

      - name: Package JVM artifact
        run: |
          set -eu
          mkdir -p dist
          cp sysboot/out/cli/assembly.dest/out.jar dist/fluxion.jar
          (cd dist && sha256sum fluxion.jar > fluxion.jar.sha256)

      - name: Upload JVM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluxion-jvm
          path: |
            dist/fluxion.jar
            dist/fluxion.jar.sha256
          if-no-files-found: error

  build-native:
    name: Build Native App
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM Java 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: true

      - name: Build native image
        working-directory: sysboot
        run: ./mill cli.nativeImage

      - name: Smoke test native image
        run: sysboot/out/cli/nativeImage.dest/native-executable --help >/dev/null

      - name: Package native artifact
        run: |
          set -eu
          mkdir -p dist/pkg
          cp sysboot/out/cli/nativeImage.dest/native-executable dist/pkg/fluxion
          chmod +x dist/pkg/fluxion
          tar -C dist/pkg -czf dist/fluxion-linux-amd64.tar.gz fluxion
          (cd dist && sha256sum fluxion-linux-amd64.tar.gz > fluxion-linux-amd64.tar.gz.sha256)

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluxion-linux-amd64
          path: |
            dist/fluxion-linux-amd64.tar.gz
            dist/fluxion-linux-amd64.tar.gz.sha256
          if-no-files-found: error
