<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Fluxion</title>
  <desc id="desc">Fluxion Linux workstation bootstrapper banner</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.52" stop-color="#16313a"/>
      <stop offset="1" stop-color="#1f4f45"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#47d6b6"/>
      <stop offset="0.5" stop-color="#7aa8ff"/>
      <stop offset="1" stop-color="#f4c95d"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <circle cx="176" cy="88" r="92" fill="#47d6b6" opacity="0.2" filter="url(#soft)"/>
  <circle cx="1020" cy="236" r="118" fill="#7aa8ff" opacity="0.18" filter="url(#soft)"/>
  <path d="M80 236 C220 124 330 256 468 145 S742 128 878 195 1036 235 1120 146" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <path d="M80 262 H1120" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <g fill="#ffffff">
    <text x="90" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="0">fluxion</text>
    <text x="94" y="194" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#d6fff4">Linux workstation bootstrap from one YAML profile</text>
  </g>
  <g transform="translate(840 86)">
    <rect x="0" y="0" width="260" height="150" rx="14" fill="#0b1218" opacity="0.72" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="26" y="45" font-family="JetBrains Mono, Consolas, monospace" font-size="18" fill="#47d6b6">$ fluxion plan</text>
    <text x="26" y="82" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#ffffff">packages  ready</text>
    <text x="26" y="112" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#ffffff">dotfiles  ready</text>
    <text x="26" y="142" font-family="JetBrains Mono, Consolas, monospace" font-size="16" fill="#f4c95d">relogin   checkpoint</text>
  </g>
</svg>
