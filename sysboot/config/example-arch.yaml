profile: arch-workstation
os:
  type: arch

jobs:
  - name: system-foundation
    description: "Install base Arch packages from official repositories"
    restartPolicy:
      type: none
    continueOnModuleError: true
    steps:
      - type: packages
        name: core-cli-tools
        packageManager: pacman
        continueOnError: true
        packages:
          - git
          - curl
          - wget
          - htop
          - ripgrep
          - fd
          - bat
          - zsh
          - tmux
          - neovim
          - just
          - zellij
          - fzf
          - jq
          - tree

      - type: packages
        name: dev-tools
        packageManager: pacman
        continueOnError: true
        packages:
          - gcc
          - clang
          - cmake
          - make
          - jdk21-openjdk
          - nodejs
          - go
          - python
          - python-pip
          - rust

  - name: aur-packages
    description: "Install user-facing packages from AUR"
    dependsOn:
      - system-foundation
    restartPolicy:
      type: none
    continueOnModuleError: true
    steps:
      - type: packages
        name: aur-extras
        packageManager: paru
        continueOnError: true
        packages:
          - jetbrains-toolbox
          - google-chrome
          - visual-studio-code-bin

  - name: desktop-apps
    description: "Install desktop applications from Flathub"
    dependsOn:
      - system-foundation
    restartPolicy:
      type: none
    continueOnModuleError: true
    steps:
      - type: flatpak
        name: desktop-flatpaks
        remote: flathub
        appIds:
          - com.spotify.Client
          - org.telegram.desktop
          - com.obsproject.Studio

  - name: shell
    description: "Switch to zsh and install Oh My Zsh"
    dependsOn:
      - system-foundation
    restartPolicy:
      type: prompt-logout
      message: "Default shell changed to zsh. Log out and back in, then re-run sysboot."
    continueOnModuleError: false
    steps:
      - type: default-shell
        name: zsh-default
        shellPath: /bin/zsh
        probeCommand: "getent passwd $USER | cut -d: -f7 | grep -q zsh"

      - type: oh-my-zsh
        name: oh-my-zsh
        installDir: "~/.oh-my-zsh"
        probeCommand: "test -d ~/.oh-my-zsh"
